name: Build VCV Rack Plugin
on: [push, pull_request, workflow_dispatch]

env:
  rack-sdk-version: 2.6.6

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    permissions:
      security-events: write
      packages: read
    strategy:
      matrix:
        config:
        - {
            name: Windows,
            os: windows-latest,
            prepare-os: export CC=gcc,
            prepare-os2: "",
            postfix: win-x64
          }
        - {
            name: Linux,
            os: ubuntu-latest,
            prepare-os: sudo apt-get -y --allow-downgrades --allow-remove-essential --allow-change-held-packages update,
            prepare-os2: sudo apt install -y libglu-dev,
            postfix: lin-x64
          }
        - {
            name: MacOS-Intel,
            os: macos-15-intel,
            prepare-os: "",
            prepare-os2: "",
            postfix: mac-x64
          }          
        - {
            name: MacOS-ARM,
            os: macos-latest,
            prepare-os: "",
            prepare-os2: "",
            postfix: mac-arm64
          }
        language: [ 'c-cpp' ]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
            msystem: MINGW64
            update: false
            install: git make tar unzip zip mingw-w64-x86_64-gcc libtool mingw-w64-x86_64-jq zstd
            #install: git make tar unzip zip mingw-w64-x86_64-gcc mingw-w64-x86_64-gdb mingw-w64-x86_64-cmake autoconf automake libtool mingw-w64-x86_64-jq python zstd mingw-w64-x86_64-pkgconf
      # Try to get SDK from GitHub's internal cache
      - name: Cache Rack SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: Rack-SDK
          # The key includes the version AND the OS, so each platform gets its own cache
          key: rack-sdk-${{ env.rack-sdk-version }}-${{ matrix.config.postfix }}
      # Download ONLY if cache missed (cache-hit is not 'true')
      - name: Download Rack-SDK (Windows)
        if: runner.os == 'Windows' && steps.cache-sdk.outputs.cache-hit != 'true'
        shell: 'msys2 {0}'
        run: |
          curl -o Rack-SDK.zip https://vcvrack.com/downloads/Rack-SDK-${{ env.rack-sdk-version }}-${{ matrix.config.postfix }}.zip
          unzip Rack-SDK.zip
      - name: Download Rack-SDK (Non-Windows)
        # Check condition: Not Windows, Cache Missed, AND (Push or Tag or Dispatch)
        if: runner.os != 'Windows' && steps.cache-sdk.outputs.cache-hit != 'true'
        shell: 'bash'
        run: |
          curl -o Rack-SDK.zip https://vcvrack.com/downloads/Rack-SDK-${{ env.rack-sdk-version }}-${{ matrix.config.postfix }}.zip
          unzip Rack-SDK.zip
          # Move it to expected folder if unzip creates a nested dir, or ensure it sits where cache expects it
          # usually unzip creates "Rack-SDK" folder in current dir.
      - name: Patch plugin.mk, use 7zip on Windows
        if: runner.os == 'Windows2'
        run: |
          sed -i 's/zip -q -9 -r/7z a -tzip -mx=9/' $HOME/Rack-SDK/plugin.mk
      - name: Modify plugin version
        # only modify plugin version if no tag was created
        if: "! startsWith(github.ref, 'refs/tags/v')"
        run: |
          gitrev=`git rev-parse --short HEAD`
          pluginversion=`jq -r '.version' plugin.json`
          echo "Set plugin version from $pluginversion to $pluginversion-$gitrev"
          jq --arg VERSION "$pluginversion-$gitrev" '.version=$VERSION' plugin.json > plugin.json.tmp && mv plugin.json.tmp plugin.json
      - name: Initialize CodeQL
        if: runner.os == 'Linux'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - name: Build plugin Windows
        if: runner.os == 'Windows'
        shell: 'msys2 {0}'
        run: |
          ${{ matrix.config.prepare-os }}
          ${{ matrix.config.prepare-os2 }}
          export RACK_DIR=$(pwd)/Rack-SDK
          make -j dep
          make -j dist
      - name: Build plugin Non-Windows
        if: runner.os != 'Windows'
        shell: 'bash'
        run: |
          ${{ matrix.config.prepare-os }}
          ${{ matrix.config.prepare-os2 }}
          export RACK_DIR=$(pwd)/Rack-SDK
          make -j dep
          make -j dist
      - name: Upload artifact
        if: runner.os == 'Windows' || (github.event_name != 'push' || startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@v4
        with:
          path: dist
          name: ${{ matrix.config.name }}.zip
          retention-days: 1
      - name: Perform CodeQL Analysis
        if: runner.os == 'Linux'
        uses: github/codeql-action/analyze@v4

  publish:
    name: Publish plugin
    # only create a release if a tag was created that is called e.g. v1.2.3
    # see also https://vcvrack.com/manual/Manifest#version
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Check if plugin version matches tag
        run: |
          pluginversion=`jq -r '.version' plugin.json`
          if [ "v$pluginversion" != "${{ github.ref_name }}" ]; then
            echo "Plugin version 'v$pluginversion' doesn't match tag '${{ github.ref_name }}'"
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          path: _artifacts
          pattern: '*'
          merge-multiple: true
      - name: Create Release
        # specific commit SHA for security
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          body: |
             ${{ github.event.repository.name }} VCV Rack Plugin ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: _artifacts/**/*.vcvplugin
